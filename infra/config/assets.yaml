# FinWing asset catalog — source of truth (LLD §8.2).
# assetId is stable. hasPriceFeed=false → asset can be tracked but the daily
# summary will not report a price move for it.
#
# twelveDataSymbol is the symbol used for Twelve Data time_series (daily OHLC,
# live + historical). Conventions:
#   equities/ETFs/REITs: US ticker
#   FX:                  BASE/QUOTE (e.g. USD/JPY)
#   crypto:              BASE/USD   (e.g. BTC/USD)
#   gold:                XAU/USD    (only spot metal on TD free)
#   other commodities:   US ETF proxy (silver→SLV, WTI→USO, Brent→BNO,
#                        natgas→UNG, copper→CPER) — spot pairs are TD premium.
#   yields/no feed:      "" (hasPriceFeed: false)

